# TrueNAS Custom App: Speaches (CPU-Variante)
#
# Wenn keine NVIDIA-GPU vorhanden ist — oder nur Pascal/ältere ohne GSP-Support,
# die der in TrueNAS 25.10+ ausgelieferte Open-Treiber nicht ansprechen kann.
#
# Datasets vorher anlegen (TrueNAS UI):
#   HDDs/Applications/speaches/cache         (Modelle, ~3-6 GB pro Modell)
#   HDDs/Applications/speaches/config        (optionale Config-Dateien)
#   Owner/Group: 1000:1000 (Speaches läuft als ubuntu, UID 1000)

services:
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: speaches
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - /mnt/HDDs/Applications/speaches/cache:/home/ubuntu/.cache/huggingface
      - /mnt/HDDs/Applications/speaches/config:/config
    environment:
      # Auf CPU: medium ist der gute Kompromiss (~1× Echtzeit auf 6-Kerner).
      # small (~500 MB) ist 2× schneller, large-v3 (~3 GB) 3× langsamer als Echtzeit.
      WHISPER__MODEL: Systran/faster-whisper-medium
      WHISPER__COMPUTE_TYPE: int8
      WHISPER__INFERENCE_DEVICE: cpu
      WHISPER__CPU_THREADS: "6"
      WHISPER__NUM_WORKERS: "1"
      # Anti-Halluzination: nicht auf vorherige Segmente konditionieren
      WHISPER__CONDITION_ON_PREVIOUS_TEXT: "false"
      ENABLE_UI: "true"
      LOG_LEVEL: info
      # Optional: API-Key-Schutz aktivieren (sonst offen für jeden im LAN)
      # API_KEY: ein-langes-zufallsgeheimnis
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
